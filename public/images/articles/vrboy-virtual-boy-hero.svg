<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1020"/>
      <stop offset="100%" style="stop-color:#151d38"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ff0000;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6ee7ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6ee7ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- VR Grid perspective lines -->
  <g opacity="0.4" stroke="#ff0000" stroke-width="0.5">
    <line x1="720" y1="280" x2="-200" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="0" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="200" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="400" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="720" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="1100" y2="720" opacity="0.3"/>
    <line x1="720" y1="280" x2="1280" y2="720" opacity="0.3"/>
    <line x1="100" y1="380" x2="1180" y2="380" opacity="0.2"/>
    <line x1="50" y1="450" x2="1230" y2="450" opacity="0.15"/>
    <line x1="0" y1="550" x2="1280" y2="550" opacity="0.1"/>
  </g>
  
  <!-- Left side: Virtual Boy headset -->
  <g transform="translate(200, 240)">
    <ellipse cx="180" cy="120" rx="200" ry="150" fill="url(#redGlow)" opacity="0.5"/>
    <rect x="20" y="40" width="320" height="160" rx="8" ry="8" fill="#151d38" stroke="#ff0000" stroke-width="3"/>
    <rect x="40" y="55" width="280" height="130" rx="4" ry="4" fill="#000000" stroke="#ff0000" stroke-width="2"/>
    
    <!-- Red scanlines inside display -->
    <g stroke="#ff0000" stroke-width="1" opacity="0.4">
      <line x1="50" y1="65" x2="310" y2="65"/>
      <line x1="50" y1="85" x2="310" y2="85"/>
      <line x1="50" y1="105" x2="310" y2="105"/>
      <line x1="50" y1="125" x2="310" y2="125"/>
      <line x1="50" y1="145" x2="310" y2="145"/>
      <line x1="50" y1="165" x2="310" y2="165"/>
    </g>
    
    <!-- Eye lenses -->
    <circle cx="130" cy="120" r="35" fill="none" stroke="#ff0000" stroke-width="2"/>
    <circle cx="130" cy="120" r="18" fill="#ff0000" opacity="0.8"/>
    <circle cx="130" cy="120" r="10" fill="#ff3333"/>
    <circle cx="230" cy="120" r="35" fill="none" stroke="#ff0000" stroke-width="2"/>
    <circle cx="230" cy="120" r="18" fill="#ff0000" opacity="0.8"/>
    <circle cx="230" cy="120" r="10" fill="#ff3333"/>
    
    <!-- Side mirror housings -->
    <rect x="-25" y="70" width="45" height="100" rx="4" ry="4" fill="#151d38" stroke="#ff0000" stroke-width="2"/>
    <rect x="340" y="70" width="45" height="100" rx="4" ry="4" fill="#151d38" stroke="#ff0000" stroke-width="2"/>
    
    <!-- Strap lines -->
    <path d="M20,100 Q-20,120 -10,140 L20,160" fill="none" stroke="#ff0000" stroke-width="2"/>
    <path d="M340,100 Q380,120 370,140 L340,160" fill="none" stroke="#ff0000" stroke-width="2"/>
  </g>
  
  <!-- Virtual Boy Controller -->
  <g transform="translate(150, 550)">
    <ellipse cx="100" cy="50" rx="120" ry="60" fill="url(#redGlow)" opacity="0.3"/>
    <rect x="0" y="10" width="200" height="80" rx="15" ry="15" fill="#151d38" stroke="#ff0000" stroke-width="2"/>
    
    <!-- Left D-pad -->
    <g transform="translate(45, 50)">
      <rect x="-5" y="-15" width="10" height="30" fill="#ff0000" rx="2"/>
      <rect x="-15" y="-5" width="30" height="10" fill="#ff0000" rx="2"/>
    </g>
    
    <!-- Right D-pad -->
    <g transform="translate(155, 50)">
      <rect x="-5" y="-15" width="10" height="30" fill="#ff0000" rx="2"/>
      <rect x="-15" y="-5" width="30" height="10" fill="#ff0000" rx="2"/>
    </g>
    
    <!-- Buttons -->
    <circle cx="80" cy="30" r="10" fill="#ff0000" stroke="#aa0000" stroke-width="1"/>
    <circle cx="120" cy="30" r="10" fill="#ff0000" stroke="#aa0000" stroke-width="1"/>
  </g>
  
  <!-- Right side: Meta Quest headset -->
  <g transform="translate(800, 200)">
    <ellipse cx="200" cy="100" rx="180" ry="130" fill="url(#cyanGlow)" opacity="0.4"/>
    <rect x="60" y="40" width="280" height="120" rx="25" ry="25" fill="#151d38" stroke="#6ee7ff" stroke-width="2"/>
    <rect x="75" y="52" width="250" height="96" rx="18" ry="18" fill="#000000"/>
    
    <!-- Camera sensors -->
    <circle cx="120" cy="70" r="4" fill="#6ee7ff"/>
    <circle cx="280" cy="70" r="4" fill="#6ee7ff"/>
    <circle cx="120" cy="130" r="4" fill="#6ee7ff"/>
    <circle cx="280" cy="130" r="4" fill="#6ee7ff"/>
    
    <!-- Quest logo indicator -->
    <ellipse cx="200" cy="100" rx="30" ry="20" fill="none" stroke="#6ee7ff" stroke-width="1" opacity="0.5"/>
    
    <!-- Side straps -->
    <rect x="35" y="85" width="25" height="30" rx="3" ry="3" fill="#151d38" stroke="#6ee7ff" stroke-width="1"/>
    <rect x="340" y="85" width="25" height="30" rx="3" ry="3" fill="#151d38" stroke="#6ee7ff" stroke-width="1"/>
    
    <!-- Lens glow -->
    <circle cx="150" cy="100" r="25" fill="#6ee7ff" opacity="0.1"/>
    <circle cx="250" cy="100" r="25" fill="#6ee7ff" opacity="0.1"/>
  </g>
  
  <!-- Floating particles -->
  <g>
    <circle cx="50" cy="100" r="2" fill="#ff0000" opacity="0.6"/>
    <circle cx="150" cy="150" r="1.5" fill="#ff0000" opacity="0.5"/>
    <circle cx="80" cy="300" r="2" fill="#ff0000" opacity="0.7"/>
    <circle cx="300" cy="180" r="2.5" fill="#ff0000" opacity="0.5"/>
    <circle cx="900" cy="120" r="2" fill="#6ee7ff" opacity="0.5"/>
    <circle cx="1100" cy="200" r="2" fill="#6ee7ff" opacity="0.6"/>
    <circle cx="950" cy="450" r="2.5" fill="#6ee7ff" opacity="0.4"/>
    <circle cx="500" cy="380" r="2" fill="#ff0000" opacity="0.3"/>
    <circle cx="600" cy="420" r="1.5" fill="#6ee7ff" opacity="0.3"/>
  </g>
  
  <!-- Top accent bar -->
  <rect x="50" y="0" width="1180" height="40" fill="#6ee7ff" opacity="0.05"/>
  <line x1="50" y1="20" x2="1230" y2="20" stroke="#6ee7ff" stroke-width="1" opacity="0.2"/>
  
  <!-- Bottom vignette -->
  <rect x="0" y="650" width="1280" height="70" fill="#0b1020" opacity="0.6"/>
  
  <!-- Connection lines -->
  <g stroke="rgba(110, 231, 255, 0.2)" stroke-width="1" stroke-dasharray="5,5">
    <line x1="530" y1="350" x2="820" y2="300"/>
    <line x1="520" y1="400" x2="800" y2="340"/>
  </g>
</svg>